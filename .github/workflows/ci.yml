name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-analyze:
    name: Build and SonarQube Analysis
    # Ubuntu larger runners use a custom label you define in your GitHub org/enterprise settings
    # (Settings > Actions > Runners > New larger runner, choose 4-core / 16 GB Ubuntu).
    # Replace the label below with the one you configured.
    runs-on: ubuntu-latest-4-cores

    env:
      # Override gradle.properties -Xmx16g — a 16 GB runner cannot allocate all 16 GB to the JVM.
      # Leave ~4 GB headroom for the OS and runner agent.
      GRADLE_OPTS: >-
        -Dorg.gradle.jvmargs="-Xmx12g -Xms4g -XX:MaxMetaspaceSize=1g
        -XX:+HeapDumpOnOutOfMemoryError"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for SonarQube blame data

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build
        run: ./gradlew build

      - name: SonarQube Analysis
        run: |
          ./gradlew sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.scanner.skipSystemTruststore=true \
            -i
