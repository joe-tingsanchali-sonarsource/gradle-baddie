name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-analyze:
    name: Build and SonarQube Analysis
    # Ubuntu larger runners use a custom label you define in your GitHub org/enterprise settings
    # (Settings > Actions > Runners > New larger runner, choose 8-core / 32 GB Ubuntu).
    # Replace the label below with the one you configured.
    runs-on: ubuntu-latest-8-cores

    env:
      # 8-core / 32 GB runner: allocate 16 GB to the Gradle JVM, leaving 16 GB for the OS
      # and runner agent. Matches gradle.properties -Xmx16g.
      # Note: sonar.scanner.javaOpts has no effect with the Gradle plugin — the scanner
      # runs inside the Gradle JVM, so heap is controlled solely by this setting.
      GRADLE_OPTS: >-
        -Dorg.gradle.jvmargs="-Xmx16g -Xms4g -XX:MaxMetaspaceSize=1g
        -XX:+HeapDumpOnOutOfMemoryError"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for SonarQube blame data

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: GradleBuild
        run: ./gradlew build
      - name: SonarQube Analysis
        run: |
          ./gradlew sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.scanner.skipSystemTruststore=true \
            -i
